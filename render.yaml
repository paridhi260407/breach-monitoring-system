services:
  # ---------------------------------------------------------------------------
  # Unified BreachAlert Full-Stack Web Service (Node + Express + React SPA)
  # ---------------------------------------------------------------------------
  - type: web
    name: breach-monitoring-system
    env: node
    region: oregon
    plan: free
    buildCommand: npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        value: file:./server/dev.db
      - key: JWT_SECRET
        generateValue: true
      - key: HIBP_API_KEY
        value: mock
      - key: EMAIL_FROM
        value: no-reply@breachalert.io

