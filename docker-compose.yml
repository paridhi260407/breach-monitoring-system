version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: breachalert_postgres
    restart: always
    environment:
      POSTGRES_USER: breach_user
      POSTGRES_PASSWORD: breach_password
      POSTGRES_DB: breachalert_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U breach_user -d breachalert_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: breachalert_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  redisdata:
